<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Balance of Power - Meta v0.03</title>
    <link rel="stylesheet" href="style.css?v=0.04">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
</head>
<body>

<header class="game-header">
    <img src="title.png" alt="Battle for Balance Logo">
</header>

    <!-- Die Meta-Anzeige (Gesamtfortschritt) -->
    <div id="meta-display" style="background: #222; color: white; padding: 10px; text-align: center;">
        In den Äonen gesammelt: ✨ Hoffnung: <span id="meta-hoffnung">0</span> | 🩸 Blut: <span id="meta-blut">0</span>
    </div>
    
<div id="game-container">
    <div class="balance-title">Balance of Power</div>
    
    <div class="balance-runen-wrapper">
        <img src="runen.png" class="runen-maske" alt="Runen">
        <div id="balance-fill-gut" class="fill gut"></div>
        <div id="balance-fill-boese" class="fill boese"></div>
    </div>
 
<div class="battle-wrapper">
    <div class="visual-base base-gut"></div>
    
    <div id="battle-display" style="font-family: monospace; background: #333; color: #fff; padding: 10px; display: flex; overflow-x: auto; min-height: 120px;">
        </div>
    
    <div class="visual-base base-boese"></div>
</div>

        <div class="ui-layout">
            <div class="faction blue" id="gut">
                <h2>Orden des Lichts</h2>
                <p id="res-gut">Glaube: 50</p>
                <p id="work-gut">Arbeiter: 0</p>
                <p>In diesem Zeitalter geschöpfte Hoffnung: 
			<br> 
			<span style="display: block; text-align: center; width: 100%; font-size: 1.2em;">
			✨ <span id="run-hoffnung">0</span>
			</span>
		</p>
                <button id="btn-arbeit-gut" onclick="kaufeArbeiter('gut')">Arbeiter anwerben</button>

                <button id="btn-ritter" onclick="spawnEinheit('ritter')" class="unit-btn">
    		<img src="icon-ritter.png" class="btn-icon" alt="">
    		<span id="txt-ritter">Ritter entsenden (20)</span> <div class="tooltip">Ein tapferer Nahkämpfer mit viel Rüstung.</div>
		</button>

		<button id="btn-bogenschuetze" onclick="spawnEinheit('bogenschuetze')" class="unit-btn">
    		<img src="icon-bogen.png" class="btn-icon" alt="">
    		<span id="txt-bogenschuetze">Bogenschütze entsenden (Lade...)</span> <div class="tooltip">Fernkämpfer, der aus der Distanz angreift.</div>
		</button>

            </div>

            <div class="faction red" id="boese">
                <h2>Horden der Finsternis</h2>
                <p id="res-boese">Furcht: 50</p>
                <p id="work-boese">Sklaven: 0</p>
                <p>In diesem Zeitalter vergossenes Blut:
    			<br>
    			<span style="display: block; text-align: center; width: 100%; font-size: 1.2em;">
        		🩸 <span id="run-blut">0</span>
   			 </span>
		</p>
                <button id="btn-arbeit-boese" onclick="kaufeArbeiter('boese')">Sklaven treiben</button>
                <button id="btn-skelett" onclick="spawnEinheit('skelett')" class="unit-btn">
    		<img src="icon-skelett.png" class="btn-icon" alt="">
    		<span id="txt-skelett">Skelett beschwören (Lade...)</span> <div class="tooltip">Ein billiger Krieger, der in Massen gefährlich ist.</div>
</button>
            </div>
        </div>
    </div>

	<script src="script.js?v=0.04"></script>

</body>
</html>
