<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Balance of Power - Meta v0.05</title>
    <link rel="stylesheet" href="style.css?v=0.05">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
</head>
<body>

<header class="game-header">
    <img src="title.png" alt="Battle for Balance Logo">
</header>

<div id="meta-display" style="background: #222; color: white; padding: 10px; text-align: center;">
    In den Äonen gesammelt: ✨ Hoffnung: <span id="meta-hoffnung">0</span> | 🩸 Blut: <span id="meta-blut">0</span>
</div>
    
<div id="game-container">
    <div class="balance-title">Balance of Power</div>
    
    <div class="balance-shrine-container">
        
        <div class="momentum-panel gut-panel">
            <div id="buffs-gut" class="active-buffs"></div>
        </div>
        
        <div class="balance-runen-wrapper">
            <div id="balance-fill-gut" class="fill gut"></div>
            
            <div id="balance-fill-boese" class="fill boese"></div>
            
            <img src="runen_maske_neu.png" class="runen-maske" alt="Runen Balance">
            
            <div class="rune-marker" style="left: 10%;"></div>
            <div class="rune-marker" style="left: 20%;"></div>
            <div class="rune-marker" style="left: 30%;"></div>
            <div class="rune-marker" style="left: 40%;"></div>
            
            <div id="balance-pointer" class="rune-marker center" style="left: 50%;"></div>
            
            <div class="rune-marker" style="left: 60%;"></div>
            <div class="rune-marker" style="left: 70%;"></div>
            <div class="rune-marker" style="left: 80%;"></div>
            <div class="rune-marker" style="left: 90%;"></div>
        </div>

        <div class="momentum-panel boese-panel">
            <div id="buffs-boese" class="active-buffs"></div>
        </div>
        
    </div>
 
<div class="battle-wrapper">
    <div class="visual-base base-gut"></div>
    
    <div id="battle-display" style="font-family: monospace; background: #333; color: #fff; padding: 10px; display: flex; overflow-x: auto; min-height: 120px;">
        </div>
    
    <div class="visual-base base-boese"></div>
</div>

<div class="ui-layout">
    <div class="faction blue" id="gut">
        <h2>Orden des Lichts</h2>
        <p id="res-gut">Glaube: 50</p>
        <p style="font-size: 0.9em; color: #aaa; margin-top: -10px;">Zuwachs: +<span id="gen-gut">0</span>/s</p>
        
        <p style="font-size: 0.9em; color: #ffaa00; font-weight: bold; margin-top: -5px;">Front-Druck: <span id="masse-gut">0</span> kg</p>
        
        <p>In diesem Zeitalter geschöpfte Hoffnung: 
            <br> 
            <span style="display: block; text-align: center; width: 100%; font-size: 1.2em;">
            ✨ <span id="run-hoffnung">0</span>
            </span>
        </p>
        
        <button id="btn-ritter" onclick="kaufeKaserne('ritter')" class="unit-btn">
            <img src="icon-ritter.png" class="btn-icon" alt="">
            <span style="color: #ffd700; font-weight: bold; margin-right: 5px;">[Q]</span>
            <span id="txt-ritter">Ritter-Kaserne</span> 
            <div class="tooltip" id="tt-ritter">Lade Info...</div>
        </button>

        <button id="btn-bogenschuetze" onclick="kaufeKaserne('bogenschuetze')" class="unit-btn">
            <img src="icon-bogen.png" class="btn-icon" alt="">
            <span style="color: #ffd700; font-weight: bold; margin-right: 5px;">[W]</span>
            <span id="txt-bogenschuetze">Bogen-Kaserne</span> 
            <div class="tooltip" id="tt-bogenschuetze">Lade Info...</div>
        </button>

    </div>

    <div class="faction red" id="boese">
        <h2>Horden der Finsternis</h2>
        <p id="res-boese">Furcht: 50</p>
        <p style="font-size: 0.9em; color: #aaa; margin-top: -10px;">Zuwachs: +<span id="gen-boese">0</span>/s</p>
        
        <p style="font-size: 0.9em; color: #ffaa00; font-weight: bold; margin-top: -5px;">Front-Druck: <span id="masse-boese">0</span> kg</p>
        
        <p>In diesem Zeitalter vergossenes Blut:
            <br>
            <span style="display: block; text-align: center; width: 100%; font-size: 1.2em;">
            🩸 <span id="run-blut">0</span>
            </span>
        </p>
        
        <button id="btn-skelett" onclick="kaufeKaserne('skelett')" class="unit-btn">
            <img src="icon-skelett.png" class="btn-icon" alt="">
            <span style="color: #ffd700; font-weight: bold; margin-right: 5px;">[I]</span>
             <span id="txt-skelett">Skelett-Friedhof</span> 
            <div class="tooltip" id="tt-skelett">Lade Info...</div>
        </button>
        
        <button id="btn-oger" onclick="kaufeKaserne('oger')" class="unit-btn">
            <span style="color: #ffd700; font-weight: bold; margin-right: 5px;">[O]</span>
             <span id="txt-oger">Oger-Höhle</span> 
            <div class="tooltip" id="tt-oger">Lade Info...</div>
        </button>

    </div>
</div>

<script src="script.js?v=0.05"></script>

</body>
</html>
